std = "roblox"

[rules]
multiple_statements = "allow"
shadowing = "allow"
global_usage = "allow"
unscoped_variables = "deny"
unused_variable = "allow"
empty_if = "deny"

# The Iron Gate: Prevent debugging statements from entering production
[rules.suspicious_function_call]
severity = "error"
functions = ["print", "warn"]
